[pytest]
testpaths = tests
# Put the repo root on sys.path so tests resolve `import ym_client` even when
# the package isn't installed editable.
pythonpath = .
# The client's methods are coroutines; run them without an explicit
# @pytest.mark.asyncio on every test.
asyncio_mode = auto
addopts =
    -ra
    --strict-markers
    --cov=ym_client
    --cov-report=term-missing
# Coverage threshold is enforced in CI (--cov-fail-under), not here, so a
# partial local run doesn't fail.
